    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            max-width: 440px;
            width: 100%;
            background-color: #111827;
            border-radius: 20px;
            padding: 40px 32px;
            text-align: center;
            border: 1px solid #1f2937;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* 🖼️ Photo Section */
        .profile-img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px auto;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background-color: #1f2937;
        }

        /* 👑 Bada Naam */
        h1 {
            font-size: 36px; /* Size bada kiya hai */
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.2;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bio {
            color: #9ca3af;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 28px;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px 16px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-yt { background-color: #dc2626; }
        .btn-yt:hover { background-color: #b91c1c; }
        
        .btn-ln { background-color: #2563eb; }
        .btn-ln:hover { background-color: #1d4ed8; }
        
        .btn-insta { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
        }
        .btn-insta:hover { opacity: 0.95; }

        .project-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #1f2937;
            text-align: left;
        }
        .project-title {
            font-size: 12px;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .project-box {
            background-color: #0b0f19;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #1f2937;
        }
        .project-name {
            font-size: 14px;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 4px;
        }
        .project-desc {
            font-size: 12px;
            color: #9ca3af;
            line-height: 1.6;
        }
        footer {
            margin-top: 32px;
            color: #4b5563;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- Main Card -->
    <div class="card">
        
        <!-- 🖼️ Profile Photo Section -->
        <div class="profile-img-container">
            <!-- apni_photo.jpg ko apne image file name se badlein -->
            <img src="user.jpeg.jpg" alt="Profile Picture" class="profile-img">
        </div>

        <!-- 👑 Bada Naam -->
        <h1>THE MD FAZIL.786</h1>
        <p class="bio">Full Stack Developer </p>

        <!-- Social Links Buttons -->
        <div class="links-container">
            <a href="https://www.youtube.com/@THEMDFAZIL..786" target="_blank" class="btn btn-yt"> YouTube Channel</a>
            <a href="https://www.linkedin.com/in/themdfazil" target="_blank" class="btn btn-ln"> LinkedIn Profile</a>
            <a href="https://www.instagram.com/themdfazil.official?igsh=NG93YWI0NnB2aXRo" target="_blank" class="btn btn-insta"> Instagram</a>
        </div>

    <footer>
        © 2026 Developed by the original md fazil
    </footer>

</body>
</html>
