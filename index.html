    <!-- Internal CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            max-width: 440px;
            width: 100%;
            background-color: #111827;
            border-radius: 20px;
            padding: 40px 32px;
            text-align: center;
            border: 1px solid #1f2937;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        
        /* 🖼️ Photo Section (Square Box Setup) */
        .profile-img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px auto;
            border-radius: 16px; 
            padding: 4px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            transition: transform 0.2s ease;
        }
        /* ✨ Image Hover Effect */
        .profile-img-container:hover {
            transform: scale(1.05);
            cursor: pointer;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px; 
            background-color: #1f2937;
        }
        
        /* 👑 Bada Naam */
        h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.2;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bio {
            color: #9ca3af;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 28px;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px 16px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-yt { background-color: #dc2626; }
        .btn-yt:hover { background-color: #b91c1c; }
        
        .btn-ln { background-color: #2563eb; }
        .btn-ln:hover { background-color: #1d4ed8; }
        
        .btn-insta { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
        }
        .btn-insta:hover { opacity: 0.95; }

        footer {
            margin-top: 32px;
            color: #4b5563;
            font-size: 12px;
            text-align: center;
        }
    </style>
